spring:
  application:
    name: my-chat-api
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  data:
    mongodb:
      uri: ${MONGO_URI}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  servlet:
    context-path: /api

cors:
  allowed-origins: ${CORS_ORIGIN:http://localhost:8000}
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  allowed-headers: "*"

security:
  jwt:
    secret-key: ${JWT_SECRET}
    expiration-time: ${EXPIRATION:900000}
  

